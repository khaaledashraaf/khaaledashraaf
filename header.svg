<svg width="590" height="120" viewBox="0 0 590 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&amp;display=swap');
    
    .line {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 14px;
      fill: #24292f;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    
    .line-1 { animation-delay: 0s; }
    .line-2 { animation-delay: 0.15s; }
    .line-3 { animation-delay: 0.3s; }
    .line-4 { animation-delay: 0.45s; }
    .line-5 { animation-delay: 0.6s; }
    
    .cursor {
      fill: #d97706;
      opacity: 0;
      animation: cursorAppear 0.1s ease forwards 0.9s, blink 1s step-end infinite 1s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes cursorAppear {
      to { opacity: 1; }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    @media (prefers-color-scheme: dark) {
      .line { fill: #e6edf3; }
    }
  </style>
  
  <text x="0" y="18" class="line line-1">  _    _           _          _             _                __ </text>
  <text x="0" y="38" class="line line-2"> | | _| |__   __ _| | ___  __| |   __ _ ___| |__  _ __ __ _ / _|</text>
  <text x="0" y="58" class="line line-3"> | |/ / '_ \ / _` | |/ _ \/ _` |  / _` / __| '_ \| '__/ _` | |_ </text>
  <text x="0" y="78" class="line line-4"> |   &lt;| | | | (_| | |  __/ (_| | | (_| \__ \ | | | | | (_| |  _|</text>
  <text x="0" y="98" class="line line-5"> |_|\_\_| |_|\__,_|_|\___|\__,_|  \__,_|___/_| |_|_|  \__,_|_|  </text>
  
  <rect x="540" y="84" width="2" height="16" class="cursor" rx="1" />
</svg>
